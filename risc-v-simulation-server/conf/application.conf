play.http.secret.key = "lkoid9hrg735z8t04opfewkdpsuig9uiphoidas"

# Disable CSRF — this is a headless API server; the React frontend
# authenticates via session/token, not browser cookies.
play.filters.disabled += "play.filters.csrf.CSRFFilter"

# CORS — allow the Vite dev server and any configured production origin.
play.filters.enabled += "play.filters.cors.CORSFilter"
play.filters.cors {
  allowedOrigins  = ["http://localhost:5173", "http://localhost:8080"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Content-Type", "Accept", "Origin", "Authorization"]
  preflightMaxAge = 3 days
}

# Allow all hosts during development; restrict to specific domains in production.
play.filters.hosts {
  allowed = ["."]
}

# Keep the WebSocket connection alive indefinitely while the simulation runs.
play.server.http.address = "0.0.0.0"
play.server.http.idleTimeout = infinite
play.server.pekko.requestTimeout = infinite
